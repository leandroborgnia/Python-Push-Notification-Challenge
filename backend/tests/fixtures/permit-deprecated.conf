# RabbitMQ 4.1 disables transient non-exclusive queues by default, which breaks Celery's
# control/pidbox (broadcast) queues used by control.ping / inspect. Re-permit the feature
# until kombu/Celery stop declaring them. Additive drop-in (conf.d) — preserves image defaults.
#
# Test fixture: mounted into the Testcontainers RabbitMQ by conftest.py. The in-cluster dev
# RabbitMQ gets the same directive from the dev overlay's ConfigMap (rabbitmq-config.yaml);
# these are the two separate environments that each need it (the old deploy/rabbitmq/ home was
# retired with docker-compose by feature 002-env-up-scripts).
deprecated_features.permit.transient_nonexcl_queues = true
