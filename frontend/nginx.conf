# nginx server for the built SPA. History-fallback so client-side routes resolve to index.html
# (the API is reached directly via VITE_API_BASE_URL — no reverse proxy here).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets; never cache the HTML entrypoint.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
