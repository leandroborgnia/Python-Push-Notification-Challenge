name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (with Python 3.13)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Typecheck (mypy)
        run: uv run mypy

      - name: Test (pytest + Testcontainers Postgres & RabbitMQ)
        run: uv run coverage run -m pytest

      - name: Coverage report
        run: uv run coverage lcov -o coverage.lcov

      - name: Publish to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: backend/coverage.lcov
          flag-name: backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
      - run: npm test
