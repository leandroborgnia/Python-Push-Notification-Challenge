name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Validate rendered Kustomize overlays (kubeconform)
        run: |
          # Pinned kubeconform release — no floating `releases/latest` tag (Principle I).
          curl -sSL \
            https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz \
            | tar xz
          # The dev overlay's secretGenerator reads a gitignored secret.env — materialize the
          # committed example so the overlay renders (placeholder values only; CI-local file).
          cp deploy/k8s/overlays/dev/secret.env.example deploy/k8s/overlays/dev/secret.env
          for env in dev prod; do
            echo "== validating overlays/$env =="
            kubectl kustomize "deploy/k8s/overlays/$env" \
              | ./kubeconform -strict -summary -ignore-missing-schemas -
          done

  deploy:
    needs: validate-manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Build image
        run: docker build -t notification-service:${{ github.sha }} backend
      # Deploy to the cluster. Requires KUBECONFIG / registry credentials configured as
      # repository secrets; the apply wires /livez -> livenessProbe and /readyz -> readinessProbe
      # via deploy/k8s/.
      - name: Apply manifests
        run: |
          # Deploy the immutable git-SHA image tag (never :latest). Requires KUBECONFIG + registry.
          echo "kubectl apply -f deploy/k8s/"
          echo "kubectl set image deployment/notification-api api=notification-service:${{ github.sha }}"
