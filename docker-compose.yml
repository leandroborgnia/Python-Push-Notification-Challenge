services:
  postgres:
    image: postgres:16.14-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.3.2-management@sha256:76412b1ed2865b88ed01b4a504f72e888842f2089a7527743d325ce7c9d3a43b
    volumes:
      - ./deploy/rabbitmq/permit-deprecated.conf:/etc/rabbitmq/conf.d/10-permit-deprecated.conf:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL_ASYNC: postgresql+asyncpg://app:app@postgres:5432/app
      DATABASE_URL_SYNC: postgresql+psycopg://app:app@postgres:5432/app
      BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')\""
      interval: 10s
      timeout: 5s
      retries: 10

  cpu-worker:
    build: ./backend
    environment:
      DATABASE_URL_SYNC: postgresql+psycopg://app:app@postgres:5432/app
      BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--pool=prefork", "-n", "cpu@%h", "-Q", "cpu", "-c", "4", "--loglevel=INFO"]
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  io-worker:
    build: ./backend
    environment:
      DATABASE_URL_SYNC: postgresql+psycopg://app:app@postgres:5432/app
      BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--pool=threads", "-n", "io@%h", "-Q", "io", "-c", "20", "--loglevel=INFO"]
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api
