minimum_pre_commit_version: "3.5.0"
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint)
        entry: uv run --project backend ruff check --fix
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: ruff (format)
        entry: uv run --project backend ruff format
        language: system
        types: [python]
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: uv run --project backend mypy
        language: system
        types: [python]
        pass_filenames: false
      - id: eslint-frontend
        name: eslint (frontend)
        entry: npm --prefix frontend run lint
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
      - id: prettier-frontend
        name: prettier (frontend)
        entry: npm --prefix frontend run format
        language: system
        files: ^frontend/.*\.(ts|tsx|json|css|html)$
        pass_filenames: false
