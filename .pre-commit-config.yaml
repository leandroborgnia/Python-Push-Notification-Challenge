minimum_pre_commit_version: "3.5.0"
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint)
        entry: uv run --project backend ruff check --fix
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: ruff (format)
        entry: uv run --project backend ruff format
        language: system
        types: [python]
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: uv run --project backend mypy
        language: system
        types: [python]
        pass_filenames: false
