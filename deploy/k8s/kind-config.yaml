# kind cluster config used ONLY by up-dev (not part of the kustomize tree). One control-plane
# node labeled ingress-ready=true with host :80/:443 mapped to the node, so ingress-nginx serves
# on the host and `app.localhost` / `api.localhost` route without anything installed on the host
# (FR-019, FR-020; research R4).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
