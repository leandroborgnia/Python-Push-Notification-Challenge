apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: notification
spec:
  # ingress-nginx (installed into kind by up-dev; the cluster's controller in prod).
  ingressClassName: nginx
  # Two hosts, no path rewrite (research R2). Hostnames are placeholders patched per overlay:
  #   dev  → app.localhost / api.localhost
  #   prod → configured prod hostnames
  rules:
    - host: app.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: api.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: notification-api
                port:
                  number: 80
