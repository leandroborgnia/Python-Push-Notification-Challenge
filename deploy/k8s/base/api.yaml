apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  labels:
    app: notification-api
spec:
  # Replicas patched per overlay (dev=1, prod=N).
  replicas: 1
  selector:
    matchLabels:
      app: notification-api
  template:
    metadata:
      labels:
        app: notification-api
    spec:
      # Block startup until the schema is at head. This init container only WAITS (no DDL);
      # the migration itself runs once per deploy in the migrate-<tag> Job (FR-014, SC-007).
      initContainers:
        - name: await-migrations
          image: __API_IMAGE__
          workingDir: /app
          command:
            - sh
            - -c
            - |
              echo "await-migrations: waiting for schema to reach head...";
              until alembic current 2>/dev/null | grep -q '(head)'; do
                echo "await-migrations: schema not at head yet; retrying in 2s";
                sleep 2;
              done;
              echo "await-migrations: schema is at head."
          env:
            - name: DATABASE_URL_SYNC
              valueFrom:
                secretKeyRef:
                  name: notification-secrets
                  key: database-url-sync
      containers:
        - name: api
          image: __API_IMAGE__
          # One uvicorn process per pod; Kubernetes scales via replicas. Migrations are NOT
          # in this command — they run in the migrate Job (FR-014).
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL_ASYNC
              valueFrom:
                secretKeyRef:
                  name: notification-secrets
                  key: database-url-async
            - name: DATABASE_URL_SYNC
              valueFrom:
                secretKeyRef:
                  name: notification-secrets
                  key: database-url-sync
            - name: BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: notification-secrets
                  key: broker-url
          # Liveness = process only (failure -> restart); never gated on DB/workers.
          livenessProbe:
            httpGet:
              path: /livez
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          # Readiness = process + DB (failure -> depool, no restart); never gated on workers.
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-api
  labels:
    app: notification-api
spec:
  selector:
    app: notification-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
