apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# All resources land in the `notification` namespace (also set on the Namespace object).
namespace: notification

resources:
  - namespace.yaml
  - api.yaml
  - cpu-worker.yaml
  - io-worker.yaml
  - frontend.yaml
  - migrate-job.yaml
  - ingress.yaml
